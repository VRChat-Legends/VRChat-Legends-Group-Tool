<!DOCTYPE html>
<html lang="en" style="background:#0A0A0A;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />
    <link rel="icon" type="image/png" href="/assets/branding/group_tool_icon.png" />
    <title>VRChat Legends Group Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body style="background:#0A0A0A;margin:0;min-height:100vh;color:#9ca3af;">
    <div id="root" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;min-height:100vh;font-family:Montserrat,system-ui,sans-serif;background:#0A0A0A;">
      <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(145deg,#1a1a1f,#0d0d10);box-shadow:0 12px 40px rgba(107,70,193,0.25);position:relative;">
        <div style="position:absolute;inset:-3px;border-radius:16px;border:2px solid rgba(107,70,193,0.35);border-top-color:rgba(167,139,250,0.9);animation:vrclspin 1s linear infinite;"></div>
      </div>
      <span style="font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent;">VRChat Legends</span>
    </div>
    <style>@keyframes vrclspin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
